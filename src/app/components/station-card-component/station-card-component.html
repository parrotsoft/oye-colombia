<article
  class="group relative flex flex-col items-center justify-between rounded-2xl bg-white p-5 shadow-sm transition-all hover:-translate-y-1 hover:shadow-xl"
  [attr.aria-label]="'Reproducir ' + station()?.name"
>
  <div class="flex flex-col items-center space-y-3">
    <div
      class="flex h-28 w-28 items-center justify-center overflow-hidden rounded-full bg-gray-100 shadow-inner"
    >
      <img
        [src]="station()?.logo"
        [alt]="station()?.name + ' logo'"
        loading="lazy"
        width="96"
        height="96"
        class="h-24 w-24 object-contain transition-transform duration-300 group-hover:scale-110"
      />
    </div>

    <h2
      class="text-center text-lg font-semibold text-gray-800 group-hover:text-indigo-600 transition-colors duration-300"
    >
      {{ station()?.name }}
    </h2>
  </div>

  <audio
    #audioEl
    controls
    [src]="station()?.stream"
    [title]="station()?.name + ' — en vivo'"
    (play)="onPlay()"
    (pause)="onPause()"
    (ended)="onPause()"
    class="mt-4 w-full accent-indigo-600"
  ></audio>

  <div
    class="absolute inset-0 -z-10 rounded-2xl bg-gradient-to-tr from-indigo-200/40 via-transparent to-transparent opacity-0 transition-opacity duration-500 group-hover:opacity-100"
  ></div>
</article>
